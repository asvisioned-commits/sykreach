      </div>

        </div>

      <div class="arrow"><svg viewBox="0 0 60 20" fill="none"><path d="M2 10h48M42 4l10 6-10 6" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/></svg></div>
